name: predictor-v5-remote

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: V5 remote task id
        required: true
        type: string
      bundle_url:
        description: Bundle download URL
        required: true
        type: string
      callback_url:
        description: Render callback URL
        required: true
        type: string
      callback_token:
        description: Render callback token
        required: true
        type: string

jobs:
  predictor_v5:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download V5 bundle
        shell: bash
        run: |
          mkdir -p remote_v5_bundle
          curl -fsSL "${{ inputs.bundle_url }}" -o remote_v5_bundle/input_bundle.zip
          python - <<'PY'
          import zipfile
          from pathlib import Path

          bundle_dir = Path("remote_v5_bundle")
          with zipfile.ZipFile(bundle_dir / "input_bundle.zip", "r") as zf:
              zf.extractall(bundle_dir)
          PY

      - name: Prepare predictor environment
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          bundle_dir = Path("remote_v5_bundle")
          meta = json.loads((bundle_dir / "task_meta.json").read_text(encoding="utf-8"))
          work_dir = bundle_dir.resolve()
          env_lines = {
              "WORK_DIR": str(work_dir),
              "SCOPE_KEY": str(meta.get("scope_key", "") or "").strip(),
              "PREDICTIONS_OUTPUT": str(work_dir / "predictions_v5_stacking.csv"),
              "PREDICTOR_TARGET_LOCATION": str(meta.get("location", "") or "").strip(),
              "PREDICTOR_TARGET_SURFACE": str(meta.get("surface", "") or "").strip(),
              "PREDICTOR_TARGET_DISTANCE": str(meta.get("distance", "") or "").strip(),
              "PREDICTOR_TARGET_CONDITION": str(meta.get("track_condition", "") or "").strip(),
              "PREDICTOR_TARGET_DATE": str(meta.get("race_date", "") or "").strip(),
              "PREDICTOR_NO_PROMPT": "1",
              "ODDS_PATH": str(work_dir / "odds.csv"),
              "FUKU_ODDS_PATH": str(work_dir / "fuku_odds.csv"),
              "WIDE_ODDS_PATH": str(work_dir / "wide_odds.csv"),
              "QUINELLA_ODDS_PATH": str(work_dir / "quinella_odds.csv"),
              "EXACTA_ODDS_PATH": str(work_dir / "exacta_odds.csv"),
              "TRIO_ODDS_PATH": str(work_dir / "trio_odds.csv"),
              "TRIFECTA_ODDS_PATH": str(work_dir / "trifecta_odds.csv"),
              "PREDICTOR_LGBM_N_JOBS": "1",
          }
          github_env = Path(__import__("os").environ["GITHUB_ENV"])
          with github_env.open("a", encoding="utf-8") as fh:
              for key, value in env_lines.items():
                  fh.write(f"{key}={value}\n")
          PY

      - name: Run predictor V5
        id: run_v5
        shell: bash
        working-directory: remote_v5_bundle
        run: |
          set +e
          python "$GITHUB_WORKSPACE/predictor_v5_omc.py" > remote_v5_output.log 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build callback payload
        shell: bash
        env:
          RUN_EXIT_CODE: ${{ steps.run_v5.outputs.exit_code }}
          CALLBACK_TOKEN: ${{ inputs.callback_token }}
        run: |
          python - <<'PY'
          import base64
          import csv
          import json
          import os
          from pathlib import Path

          work_dir = Path(os.environ["WORK_DIR"])
          output_path = Path(os.environ["PREDICTIONS_OUTPUT"])
          log_path = work_dir / "remote_v5_output.log"
          exit_code = int(str(os.environ.get("RUN_EXIT_CODE", "1") or "1"))

          log_excerpt = ""
          if log_path.exists():
              log_excerpt = log_path.read_text(encoding="utf-8", errors="replace")[-4000:]

          if exit_code == 0 and output_path.exists():
              with output_path.open("r", encoding="utf-8-sig", errors="replace", newline="") as fh:
                  rows = list(csv.DictReader(fh))
              payload = {
                  "status": "succeeded",
                  "callback_token": os.environ["CALLBACK_TOKEN"],
                  "summary": {
                      "row_count": len(rows),
                      "top1_horse_no": str(rows[0].get("HorseNo", "") or "").strip() if rows else "",
                      "top1_horse_name": str(rows[0].get("HorseName", "") or "").strip() if rows else "",
                  },
                  "result": {
                      "filename": output_path.name,
                      "content_base64": base64.b64encode(output_path.read_bytes()).decode("ascii"),
                  },
                  "log_excerpt": log_excerpt,
              }
          else:
              payload = {
                  "status": "failed",
                  "callback_token": os.environ["CALLBACK_TOKEN"],
                  "error_message": f"predictor_v5_omc.py failed with exit_code={exit_code}",
                  "log_excerpt": log_excerpt,
              }

          Path("callback_payload.json").write_text(
              json.dumps(payload, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          PY

      - name: Post callback
        shell: bash
        env:
          CALLBACK_URL: ${{ inputs.callback_url }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.request
          from pathlib import Path

          payload = Path("callback_payload.json").read_text(encoding="utf-8")
          req = urllib.request.Request(
              os.environ["CALLBACK_URL"],
              data=payload.encode("utf-8"),
              headers={"Content-Type": "application/json; charset=utf-8"},
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=60) as resp:
              print(resp.read().decode("utf-8", errors="replace"))
          PY

      - name: Fail workflow on remote failure
        shell: bash
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          payload = json.loads(Path("callback_payload.json").read_text(encoding="utf-8"))
          sys.exit(0 if str(payload.get("status", "") or "").strip().lower() == "succeeded" else 1)
          PY
