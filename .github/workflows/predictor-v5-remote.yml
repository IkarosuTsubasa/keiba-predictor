name: predictor-remote-batch

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: Remote predictor task id
        required: true
        type: string
      bundle_url:
        description: Bundle download URL
        required: true
        type: string
      callback_url:
        description: Render callback URL
        required: true
        type: string

jobs:
  predictor_batch:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements-gha.txt"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-gha.txt

      - name: Download predictor bundle
        shell: bash
        run: |
          mkdir -p remote_v5_bundle
          curl -fsSL "${{ inputs.bundle_url }}" -o remote_v5_bundle/input_bundle.zip
          python - <<'PY'
          import zipfile
          from pathlib import Path

          bundle_dir = Path("remote_v5_bundle")
          with zipfile.ZipFile(bundle_dir / "input_bundle.zip", "r") as zf:
              zf.extractall(bundle_dir)
          PY

      - name: Run predictor batch
        id: run_batch
        shell: bash
        run: |
          set +e
          python pipeline/run_remote_predictors_batch.py --workspace remote_v5_bundle > remote_predictor_output.log 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build callback payload
        shell: bash
        env:
          RUN_EXIT_CODE: ${{ steps.run_batch.outputs.exit_code }}
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          import zipfile
          from pathlib import Path

          work_dir = Path("remote_v5_bundle")
          log_path = Path("remote_predictor_output.log")
          summary_path = work_dir / "remote_predictor_summary.json"
          output_zip = Path("predictor_outputs.zip")
          exit_code = int(str(os.environ.get("RUN_EXIT_CODE", "1") or "1"))

          log_excerpt = ""
          if log_path.exists():
              log_excerpt = log_path.read_text(encoding="utf-8", errors="replace")[-8000:]
          structured_log_tail = ""
          if log_path.exists():
              lines = log_path.read_text(encoding="utf-8", errors="replace").splitlines()
              marker_lines = [line for line in lines if "[remote_predictor]" in line]
              if marker_lines:
                  structured_log_tail = "\n".join(marker_lines[-20:])

          summary = {}
          if summary_path.exists():
              try:
                  summary = json.loads(summary_path.read_text(encoding="utf-8"))
              except Exception:
                  summary = {}

          task_meta = {}
          task_meta_path = work_dir / "task_meta.json"
          if task_meta_path.exists():
              try:
                  task_meta = json.loads(task_meta_path.read_text(encoding="utf-8"))
              except Exception:
                  task_meta = {}

          predictor_to_file = {
              "main": "predictions.csv",
              "v2_opus": "predictions_v2_opus.csv",
              "v3_premium": "predictions_v3_premium.csv",
              "v4_gemini": "predictions_v4_gemini.csv",
              "v5_stacking": "predictions_v5_stacking.csv",
              "v6_kiwami": "predictions_v6_kiwami.csv",
          }
          requested_predictor_ids = [
              str(item or "").strip()
              for item in list(task_meta.get("predictor_ids") or [])
              if str(item or "").strip()
          ]
          required_files = [
              predictor_to_file[predictor_id]
              for predictor_id in requested_predictor_ids
              if predictor_id in predictor_to_file
          ]
          if not required_files:
              required_files = list(predictor_to_file.values())
          missing_files = [name for name in required_files if not (work_dir / name).exists()]

          if exit_code == 0 and not missing_files:
              with zipfile.ZipFile(output_zip, "w", compression=zipfile.ZIP_DEFLATED) as zf:
                  for name in required_files:
                      zf.write(work_dir / name, arcname=name)
                  if summary_path.exists():
                      zf.write(summary_path, arcname="remote_predictor_summary.json")
              payload = {
                  "status": "succeeded",
                  "summary": summary,
                  "result": {
                      "filename": output_zip.name,
                      "content_base64": base64.b64encode(output_zip.read_bytes()).decode("ascii"),
                  },
                  "log_excerpt": log_excerpt,
                  "structured_log_tail": structured_log_tail,
              }
          else:
              error_message = f"remote predictor batch failed with exit_code={exit_code}"
              if missing_files:
                  error_message += " missing_files=" + ",".join(missing_files)
              payload = {
                  "status": "failed",
                  "summary": summary,
                  "error_message": error_message,
                  "log_excerpt": log_excerpt,
                  "structured_log_tail": structured_log_tail,
              }

          Path("callback_payload.json").write_text(
              json.dumps(payload, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          PY

      - name: Post callback
        shell: bash
        env:
          CALLBACK_URL: ${{ inputs.callback_url }}
          PIPELINE_CALLBACK_SECRET: ${{ secrets.PIPELINE_CALLBACK_SECRET }}
        run: |
          python - <<'PY'
          import hashlib
          import hmac
          import os
          import urllib.request
          from pathlib import Path

          payload_bytes = Path("callback_payload.json").read_bytes()
          secret = os.environ.get("PIPELINE_CALLBACK_SECRET", "").encode("utf-8")
          sig = "sha256=" + hmac.new(secret, payload_bytes, hashlib.sha256).hexdigest()
          req = urllib.request.Request(
              os.environ["CALLBACK_URL"],
              data=payload_bytes,
              headers={
                  "Content-Type": "application/json; charset=utf-8",
                  "X-Hub-Signature-256": sig,
              },
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=120) as resp:
              print(resp.read().decode("utf-8", errors="replace"))
          PY

      - name: Show callback payload summary
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("callback_payload.json").read_text(encoding="utf-8"))
          status = str(payload.get("status", "") or "").strip().lower()
          print(f"callback status: {status or '-'}")
          error_message = str(payload.get("error_message", "") or "").strip()
          if error_message:
              print(f"error_message: {error_message}")
          summary = payload.get("summary", {})
          if isinstance(summary, dict) and summary:
              print("summary:")
              for key in sorted(summary.keys()):
                  print(f"  {key}: {summary.get(key)}")
          structured_log_tail = str(payload.get("structured_log_tail", "") or "").strip()
          if structured_log_tail:
              print("structured_log_tail:")
              print(structured_log_tail)
          log_excerpt = str(payload.get("log_excerpt", "") or "").strip()
          if log_excerpt:
              print("log_excerpt_tail:")
              print(log_excerpt[-4000:])
          PY

      - name: Upload remote predictor diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: remote-predictor-diagnostics-${{ inputs.task_id }}
          if-no-files-found: warn
          path: |
            callback_payload.json
            remote_predictor_output.log
            predictor_outputs.zip
            remote_v5_bundle/remote_predictor_summary.json

      - name: Fail workflow on remote failure
        shell: bash
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          payload = json.loads(Path("callback_payload.json").read_text(encoding="utf-8"))
          status = str(payload.get("status", "") or "").strip().lower()
          if status == "succeeded":
              sys.exit(0)

          print(f"callback status: {status or '-'}")
          error_message = str(payload.get("error_message", "") or "").strip()
          if error_message:
              print(f"error_message: {error_message}")
          summary = payload.get("summary", {})
          if isinstance(summary, dict) and summary:
              print("summary:")
              for key in sorted(summary.keys()):
                  print(f"  {key}: {summary.get(key)}")
          structured_log_tail = str(payload.get("structured_log_tail", "") or "").strip()
          if structured_log_tail:
              print("structured_log_tail:")
              print(structured_log_tail)
          log_excerpt = str(payload.get("log_excerpt", "") or "").strip()
          if log_excerpt:
              print("log_excerpt_tail:")
              print(log_excerpt[-4000:])
          sys.exit(1)
          PY
