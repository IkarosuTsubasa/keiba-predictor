name: predictor-remote-batch

on:
  workflow_dispatch:
    inputs:
      task_id:
        description: Remote predictor task id
        required: true
        type: string
      bundle_url:
        description: Bundle download URL
        required: true
        type: string
      callback_url:
        description: Render callback URL
        required: true
        type: string

jobs:
  predictor_batch:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements-gha.txt"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-gha.txt

      - name: Download predictor bundle
        shell: bash
        run: |
          mkdir -p remote_v5_bundle
          curl -fsSL "${{ inputs.bundle_url }}" -o remote_v5_bundle/input_bundle.zip
          python - <<'PY'
          import zipfile
          from pathlib import Path

          bundle_dir = Path("remote_v5_bundle")
          with zipfile.ZipFile(bundle_dir / "input_bundle.zip", "r") as zf:
              zf.extractall(bundle_dir)
          PY

      - name: Run predictor batch
        id: run_batch
        shell: bash
        run: |
          set +e
          python pipeline/run_remote_predictors_batch.py --workspace remote_v5_bundle > remote_predictor_output.log 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build callback payload
        shell: bash
        env:
          RUN_EXIT_CODE: ${{ steps.run_batch.outputs.exit_code }}
        run: |
          python - <<'PY'
          import base64
          import json
          import os
          import zipfile
          from pathlib import Path

          work_dir = Path("remote_v5_bundle")
          log_path = Path("remote_predictor_output.log")
          summary_path = work_dir / "remote_predictor_summary.json"
          output_zip = Path("predictor_outputs.zip")
          exit_code = int(str(os.environ.get("RUN_EXIT_CODE", "1") or "1"))

          log_excerpt = ""
          if log_path.exists():
              log_excerpt = log_path.read_text(encoding="utf-8", errors="replace")[-8000:]

          summary = {}
          if summary_path.exists():
              try:
                  summary = json.loads(summary_path.read_text(encoding="utf-8"))
              except Exception:
                  summary = {}

          required_files = [
              "predictions.csv",
              "predictions_v2_opus.csv",
              "predictions_v3_premium.csv",
              "predictions_v4_gemini.csv",
              "predictions_v5_stacking.csv",
          ]
          missing_files = [name for name in required_files if not (work_dir / name).exists()]

          if exit_code == 0 and not missing_files:
              with zipfile.ZipFile(output_zip, "w", compression=zipfile.ZIP_DEFLATED) as zf:
                  for name in required_files:
                      zf.write(work_dir / name, arcname=name)
                  if summary_path.exists():
                      zf.write(summary_path, arcname="remote_predictor_summary.json")
              payload = {
                  "status": "succeeded",
                  "summary": summary,
                  "result": {
                      "filename": output_zip.name,
                      "content_base64": base64.b64encode(output_zip.read_bytes()).decode("ascii"),
                  },
                  "log_excerpt": log_excerpt,
              }
          else:
              error_message = f"remote predictor batch failed with exit_code={exit_code}"
              if missing_files:
                  error_message += " missing_files=" + ",".join(missing_files)
              payload = {
                  "status": "failed",
                  "summary": summary,
                  "error_message": error_message,
                  "log_excerpt": log_excerpt,
              }

          Path("callback_payload.json").write_text(
              json.dumps(payload, ensure_ascii=False, indent=2),
              encoding="utf-8",
          )
          PY

      - name: Post callback
        shell: bash
        env:
          CALLBACK_URL: ${{ inputs.callback_url }}
          PIPELINE_CALLBACK_SECRET: ${{ secrets.PIPELINE_CALLBACK_SECRET }}
        run: |
          python - <<'PY'
          import hashlib
          import hmac
          import os
          import urllib.request
          from pathlib import Path

          payload_bytes = Path("callback_payload.json").read_bytes()
          secret = os.environ.get("PIPELINE_CALLBACK_SECRET", "").encode("utf-8")
          sig = "sha256=" + hmac.new(secret, payload_bytes, hashlib.sha256).hexdigest()
          req = urllib.request.Request(
              os.environ["CALLBACK_URL"],
              data=payload_bytes,
              headers={
                  "Content-Type": "application/json; charset=utf-8",
                  "X-Hub-Signature-256": sig,
              },
              method="POST",
          )
          with urllib.request.urlopen(req, timeout=120) as resp:
              print(resp.read().decode("utf-8", errors="replace"))
          PY

      - name: Fail workflow on remote failure
        shell: bash
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          payload = json.loads(Path("callback_payload.json").read_text(encoding="utf-8"))
          sys.exit(0 if str(payload.get("status", "") or "").strip().lower() == "succeeded" else 1)
          PY
