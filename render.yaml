services:
  - type: web
    name: keiba-web
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt && cd frontend && npm install && npm run build
    startCommand: cd pipeline && python web_server.py
    healthCheckPath: /
    disk:
      name: pipeline-data
      mountPath: /opt/render/project/src/pipeline/data
      sizeGB: 10
  - type: cron
    name: keiba-run-due-cron
    runtime: python
    schedule: "*/5 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: cd pipeline && python cron_trigger_run_due.py
