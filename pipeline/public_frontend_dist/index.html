    <script>
      (function () {
        try {
          var params = new URLSearchParams(window.location.search || "");
          if (params.get("app") === "1") {
            var path = String(window.location.pathname || "").replace(/\/+$/, "") || "/";
            var routeClass = "app-shell-boot--home";

            if (path === "/keiba/history") {
              routeClass = "app-shell-boot--history";
            } else if (path === "/keiba/reports") {
              routeClass = "app-shell-boot--reports";
            } else if (/^\/keiba\/reports\/.+/.test(path)) {
              routeClass = "app-shell-boot--report-detail";
            } else if (/^\/keiba\/race\/.+/.test(path)) {
              routeClass = "app-shell-boot--race-detail";
            } else if (
              /^\/keiba\/(about|guide|methodology|privacy|terms|disclaimer|contact)$/.test(path)
            ) {
              routeClass = "app-shell-boot--static";
            }

            document.documentElement.classList.add("app-shell-boot", routeClass);
          }
        } catch (_) {}
      })();
    </script>
